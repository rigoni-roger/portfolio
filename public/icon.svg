<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Roger Alves Rigoni</title>
  <desc>Monogram icon for portfolio</desc>
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .fg { fill: #0b1220; }
      .accent { stroke: #14b8a6; }
      .accentFill { fill: #14b8a6; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0b1220; }
      .fg { fill: #e6edf3; }
      .accent { stroke: #2dd4bf; }
      .accentFill { fill: #2dd4bf; }
    }
  </style>

  <defs>
    <linearGradient id="g" x1="28" y1="22" x2="152" y2="158" gradientUnits="userSpaceOnUse">
      <stop class="accentFill" stop-opacity="0.95" />
      <stop class="accentFill" offset="1" stop-opacity="0.35" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" />
    </filter>
  </defs>

  <rect class="bg" width="180" height="180" rx="40" />

  <!-- subtle accent glow -->
  <path
    d="M26 128 C58 162, 114 168, 154 140"
    stroke="url(#g)"
    stroke-width="14"
    stroke-linecap="round"
    opacity="0.45"
    filter="url(#soft)"
  />

  <!-- accent underline -->
  <path
    d="M46 122 H134"
    class="accent"
    stroke-width="6"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- monogram -->
  <g aria-hidden="true">
    <text
      x="90"
      y="104"
      text-anchor="middle"
      class="fg"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="56"
      font-weight="800"
      letter-spacing="2"
    >
      RAR
    </text>
  </g>
</svg>